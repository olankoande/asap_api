services:
  # ─────────────────────────────────────────────
  # MySQL 5.7
  # ─────────────────────────────────────────────
  db:
    image: mysql:5.7
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-carpool_platform}
      MYSQL_USER: ${MYSQL_USER:-asap}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./carpool_platform.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - asap_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─────────────────────────────────────────────
  # phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      UPLOAD_LIMIT: 128M
    expose:
      - "80"
    networks:
      - asap_net

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file: .env
    environment:
      # Ecrase DATABASE_URL du .env pour pointer vers le conteneur db interne
      DATABASE_URL: mysql://${MYSQL_USER:-asap}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-carpool_platform}
    expose:
      - "3000"
    networks:
      - asap_net

volumes:
  db_data:
    driver: local

networks:
  asap_net:
    driver: bridge
