services:
  # ─────────────────────────────────────────────
  # MySQL 5.7
  # ─────────────────────────────────────────────
  db:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: L@nk0usm2ne
      MYSQL_DATABASE: carpool_platform
      MYSQL_USER: asap
      MYSQL_PASSWORD: L@nk0usm2ne
    volumes:
      - db_data:/var/lib/mysql
      - ./carpool_platform.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - asap_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pL@nk0usm2ne", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─────────────────────────────────────────────
  # phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: L@nk0usm2ne
      UPLOAD_LIMIT: 128M
    expose:
      - "80"
    networks:
      - asap_net
      - coolify

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file: .env
    environment:
      # Override DATABASE_URL pour pointer vers le conteneur db interne
      DATABASE_URL: mysql://asap:L@nk0usm2ne@db:3306/carpool_platform
    expose:
      - "3000"
    networks:
      - asap_net
      - coolify

volumes:
  db_data:
    driver: local

networks:
  asap_net:
    driver: bridge
  coolify:
    external: true
