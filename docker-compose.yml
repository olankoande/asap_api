services:
  # ─────────────────────────────────────────────
  # MySQL 5.7
  # ─────────────────────────────────────────────
  db:
    image: mysql:5.7
    restart: unless-stopped
    command: --log-error-verbosity=1 --log_warnings=0
    environment:
      MYSQL_ROOT_PASSWORD: L@nk0usm2ne
      MYSQL_DATABASE: carpool_platform
      MYSQL_USER: asap
      MYSQL_PASSWORD: L@nk0usm2ne
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - asap_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pL@nk0usm2ne", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─────────────────────────────────────────────
  # Import SQL (structure + données) — tourne une seule fois
  # ─────────────────────────────────────────────
  db-init:
    image: mysql:5.7
    restart: on-failure
    depends_on:
      db:
        condition: service_started
    volumes:
      - ./carpool_platform.sql:/init.sql:ro
    command: >
      bash -c "
        until mysqladmin ping -h db -uroot -pL@nk0usm2ne --silent 2>/dev/null; do
          echo 'db-init: waiting for MySQL...'; sleep 3;
        done &&
        TABLES=$(mysql -h db -uroot -pL@nk0usm2ne -e 'SHOW TABLES FROM carpool_platform;' 2>/dev/null | wc -l) &&
        if [ \"$$TABLES\" -lt 2 ]; then
          echo 'db-init: importing SQL...' &&
          mysql -h db -uroot -pL@nk0usm2ne carpool_platform < /init.sql &&
          echo 'db-init: import complete';
        else
          echo 'db-init: tables already exist, skipping import';
        fi
      "
    networks:
      - asap_net

  # ─────────────────────────────────────────────
  # phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: L@nk0usm2ne
      UPLOAD_LIMIT: 128M
    expose:
      - "80"
    networks:
      - asap_net
      - coolify

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://asap:L@nk0usm2ne@db:3306/carpool_platform
      APP_URL: ${APP_URL:-}
      API_URL: ${API_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: CAD
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_URL: ${SMTP_URL:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@asapjoin.com}
      HOLD_DELAY_DAYS: ${HOLD_DELAY_DAYS:-7}
      MIN_PAYOUT_AMOUNT: ${MIN_PAYOUT_AMOUNT:-10.00}
      PAYOUT_FREQUENCY_DAYS: ${PAYOUT_FREQUENCY_DAYS:-7}
    expose:
      - "3000"
    networks:
      - asap_net
      - coolify

volumes:
  db_data:
    driver: local

networks:
  asap_net:
    driver: bridge
  coolify:
    external: true
