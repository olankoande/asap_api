services:
  # ─────────────────────────────────────────────
  # MySQL 5.7
  # ─────────────────────────────────────────────
  db:
    image: mysql:5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: L@nk0usm2ne
      MYSQL_DATABASE: carpool_platform
      MYSQL_USER: asap
      MYSQL_PASSWORD: L@nk0usm2ne
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - asap_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pL@nk0usm2ne", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─────────────────────────────────────────────
  # Import SQL (structure + données) — tourne une seule fois
  # ─────────────────────────────────────────────
  db-init:
    image: mysql:5.7
    restart: on-failure
    depends_on:
      db:
        condition: service_started
    volumes:
      - ./carpool_platform.sql:/init.sql:ro
    command: >
      bash -c "
        until mysqladmin ping -h db -uroot -pL@nk0usm2ne --silent 2>/dev/null; do
          echo 'db-init: waiting for MySQL...'; sleep 3;
        done &&
        TABLES=$(mysql -h db -uroot -pL@nk0usm2ne -e 'SHOW TABLES FROM carpool_platform;' 2>/dev/null | wc -l) &&
        if [ \"$$TABLES\" -lt 2 ]; then
          echo 'db-init: importing SQL...' &&
          mysql -h db -uroot -pL@nk0usm2ne carpool_platform < /init.sql &&
          echo 'db-init: import complete';
        else
          echo 'db-init: tables already exist, skipping import';
        fi
      "
    networks:
      - asap_net

  # ─────────────────────────────────────────────
  # phpMyAdmin
  # ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: L@nk0usm2ne
      UPLOAD_LIMIT: 128M
    expose:
      - "80"
    networks:
      - asap_net
      - coolify

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    env_file: .env
    environment:
      # Override DATABASE_URL pour pointer vers le conteneur db interne
      DATABASE_URL: mysql://asap:L@nk0usm2ne@db:3306/carpool_platform
    expose:
      - "3000"
    networks:
      - asap_net
      - coolify

volumes:
  db_data:
    driver: local

networks:
  asap_net:
    driver: bridge
  coolify:
    external: true
